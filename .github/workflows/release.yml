name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS Universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install ffmpeg libplacebo sdl3 sdl3_ttf spdlog molten-vk

      - name: Build arm64
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig"
          export CMAKE_PREFIX_PATH="$(brew --prefix)"
          cmake -B build-arm64 -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build-arm64

      # NOTE: Cross-compiling for x86_64 requires x86_64 versions of dependencies.
      # Homebrew on macos-14 (arm64) only provides arm64 libraries,
      # so a true Universal Binary would require splitting into two jobs
      # (macos-14 + macos-13) and merging with lipo.
      # For now, only the arm64 build is produced; expand as needed.
      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist/bin
          cp build-arm64/bin/eyeq dist/bin/
          bash scripts/package-macos.sh dist
          # Ad-hoc sign all dylibs and the binary to prevent Gatekeeper from blocking them
          find dist/lib -name '*.dylib' -exec codesign --force --sign - {} \;
          codesign --force --sign - dist/bin/eyeq
          tar -czvf eyeq-${VERSION}-macos-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: eyeq-macos
          path: eyeq-*-macos-*.tar.gz

  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            /home/linuxbrew/.linuxbrew/Cellar
            /home/linuxbrew/.linuxbrew/opt
          key: linuxbrew-release-${{ runner.os }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            linuxbrew-release-${{ runner.os }}-

      - name: Install dependencies
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install fmt ffmpeg libplacebo sdl3 sdl3_ttf spdlog patchelf vulkan-headers
          brew list --formula | while read -r formula; do
            brew link --overwrite "$formula" || true
          done

      - name: Debug dependency discovery
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig"

          echo "brew prefix: $(brew --prefix)"
          echo "fmt prefix: $(brew --prefix fmt)"
          echo "ffmpeg prefix: $(brew --prefix ffmpeg)"
          echo "libplacebo prefix: $(brew --prefix libplacebo)"
          echo "sdl3 prefix: $(brew --prefix sdl3)"
          echo "sdl3_ttf prefix: $(brew --prefix sdl3_ttf)"
          echo "spdlog prefix: $(brew --prefix spdlog)"
          echo "patchelf prefix: $(brew --prefix patchelf)"
          echo "vulkan-headers prefix: $(brew --prefix vulkan-headers)"

          test -f "$(brew --prefix)/lib/cmake/fmt/fmtConfig.cmake" && echo "global fmtConfig exists" || echo "global fmtConfig missing"
          test -f "$(brew --prefix fmt)/lib/cmake/fmt/fmtConfig.cmake" && echo "keg fmtConfig exists" || echo "keg fmtConfig missing"
          test -f "$(brew --prefix)/lib/cmake/SDL3/SDL3Config.cmake" && echo "global SDL3Config exists" || echo "global SDL3Config missing"
          test -f "$(brew --prefix sdl3)/lib/cmake/SDL3/SDL3Config.cmake" && echo "keg SDL3Config exists" || echo "keg SDL3Config missing"
          test -f "$(brew --prefix sdl3_ttf)/lib/cmake/SDL3_ttf/SDL3_ttfConfig.cmake" && echo "keg SDL3_ttfConfig exists" || echo "keg SDL3_ttfConfig missing"
          test -f "$(brew --prefix)/include/vulkan/vulkan.h" && echo "global vulkan.h exists" || echo "global vulkan.h missing"
          test -f "$(brew --prefix vulkan-headers)/include/vulkan/vulkan.h" && echo "keg vulkan.h exists" || echo "keg vulkan.h missing"

          ls -la "$(brew --prefix)/lib/cmake" || true
          ls -la "$(brew --prefix fmt)/lib/cmake/fmt" || true
          ls -la "$(brew --prefix sdl3)/lib/cmake/SDL3" || true
          ls -la "$(brew --prefix sdl3_ttf)/lib/cmake/SDL3_ttf" || true
          ls -la "$(brew --prefix vulkan-headers)/include/vulkan" || true

          brew list --versions fmt ffmpeg libplacebo sdl3 sdl3_ttf spdlog patchelf vulkan-headers
          pkg-config --modversion fmt || true
          pkg-config --modversion libplacebo
          pkg-config --modversion libavcodec
          pkg-config --modversion sdl3
          pkg-config --modversion SDL3_ttf || pkg-config --modversion sdl3-ttf || true

      - name: Build
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig"
          export CMAKE_PREFIX_PATH="$(brew --prefix)"
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          DESTDIR="$(pwd)/AppDir" cmake --install build

      - name: Create AppImage
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Download linuxdeploy
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage

          # Add Linuxbrew library path to LD_LIBRARY_PATH
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export LD_LIBRARY_PATH="$(brew --prefix)/lib:$LD_LIBRARY_PATH"

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file scripts/eyeq.desktop \
            --icon-file scripts/eyeq.png \
            --output appimage

          mv EyeQ-*.AppImage eyeq-${VERSION}-linux-x86_64.AppImage 2>/dev/null \
            || mv eyeq-*.AppImage eyeq-${VERSION}-linux-x86_64.AppImage 2>/dev/null \
            || true

      - name: Package tar.gz
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export LD_LIBRARY_PATH="$(brew --prefix)/lib:$LD_LIBRARY_PATH"

          mkdir -p tar-dist/bin tar-dist/lib
          cp build/bin/eyeq tar-dist/bin/

          # Collect shared library dependencies from Linuxbrew
          ldd tar-dist/bin/eyeq | grep "$(brew --prefix)" | awk '{print $3}' | while read dep; do
            cp -L "$dep" tar-dist/lib/
          done

          # Set RPATH to a relative path so the tar.gz is self-contained
          patchelf --set-rpath '\$ORIGIN/../lib' tar-dist/bin/eyeq

          tar -czvf eyeq-${VERSION}-linux-x86_64.tar.gz -C tar-dist .

      - uses: actions/upload-artifact@v4
        with:
          name: eyeq-linux
          path: |
            eyeq-*-linux-x86_64.AppImage
            eyeq-*-linux-x86_64.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-spdlog
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-libplacebo
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-sdl3-ttf
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-ntldd
            git

      - name: Build
        run: |
          cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          cp build/bin/eyeq.exe dist/
          bash scripts/package-windows.sh dist

      - name: Create zip
        shell: pwsh
        run: |
          $version = ($env:GITHUB_REF -replace 'refs/tags/', '')
          Compress-Archive -Path dist/* -DestinationPath "eyeq-${version}-windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: eyeq-windows
          path: eyeq-*-windows-x86_64.zip

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            eyeq-macos/eyeq-*-macos-*.tar.gz
            eyeq-linux/eyeq-*-linux-x86_64.AppImage
            eyeq-linux/eyeq-*-linux-x86_64.tar.gz
            eyeq-windows/eyeq-*-windows-x86_64.zip
